version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: skael
    main: ./cmd/skael
    binary: skael
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

  - id: skael-server
    main: ./cmd/server
    binary: skael-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - id: skael
    ids:
      - skael
    name_template: "skael_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: skael-server
    ids:
      - skael-server
    name_template: "skael-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: alternayte
    name: skael-releases
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: skael
    ids:
      - skael
    repository:
      owner: alternayte
      name: homebrew-skael
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://skael.dev"
    description: "Control plane for AI agent skills"
    license: "Apache-2.0"
    install: |
      bin.install "skael"
    test: |
      system "#{bin}/skael", "version"
