version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: skael
    main: ./cmd/skael
    binary: skael
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

  - id: skael-server
    main: ./cmd/server
    binary: skael-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - id: skael
    ids:
      - skael
    name_template: "skael_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: skael-server
    ids:
      - skael-server
    name_template: "skael-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^feat'
    - title: Fixes
      regexp: '^fix'
    - title: Security
      regexp: '^security'
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^refactor:"
      - "^merge:"
      - "^task"

release:
  github:
    owner: skael-dev
    name: skael
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    The control plane for AI agent skills. Publish, sync, scan, and track SKILL.md files across your team's agents.

    ## Install

    ```bash
    # macOS / Linux (Homebrew)
    brew install skael-dev/skael/skael

    # Docker
    docker pull ghcr.io/skael-dev/skael:{{.Version}}

    # Windows: download the .zip for your architecture below
    ```

    ## Self-host the platform

    ```bash
    docker pull ghcr.io/skael-dev/skael:latest
    docker compose up -d
    skael setup http://localhost:8080 <your-api-key>
    ```

    ## What's in this release
  footer: |
    **Full changelog**: https://github.com/skael-dev/skael/compare/...v{{.Version}}

brews:
  - name: skael
    ids:
      - skael
    repository:
      owner: skael-dev
      name: homebrew-skael
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://skael.dev"
    description: "Control plane for AI agent skills"
    license: "Apache-2.0"
    install: |
      bin.install "skael"
    test: |
      system "#{bin}/skael", "version"
