name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: skael
          POSTGRES_PASSWORD: skael
          POSTGRES_DB: skael_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s
        env:
          DATABASE_URL: postgres://skael:skael@localhost:5432/skael_test?sslmode=disable

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -o bin/skael ./cmd/skael/
          CGO_ENABLED=0 go build -o bin/skael-server ./cmd/server/

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd web && npm ci

      - name: Generate OpenAPI + SDK
        run: |
          go build -o bin/skael-server ./cmd/server/
          bin/skael-server --openapi > web/openapi.json
          cd web && npx @hey-api/openapi-ts

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Build SPA
        run: cd web && npm run build
