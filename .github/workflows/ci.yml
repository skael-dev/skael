name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build SPA
        run: |
          cd web && npm ci
          go build -o ../bin/skael-server ../cmd/server/
          ../bin/skael-server --openapi > openapi.json
          npx @hey-api/openapi-ts
          npm run build

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -o bin/skael ./cmd/skael/
          CGO_ENABLED=0 go build -o bin/skael-server ./cmd/server/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Type check
        run: |
          cd web && npm ci
          go build -o ../bin/skael-server ../cmd/server/
          ../bin/skael-server --openapi > openapi.json
          npx @hey-api/openapi-ts
          npx tsc --noEmit
